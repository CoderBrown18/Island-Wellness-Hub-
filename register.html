<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Island Wellness Hub</title>

    <link rel="stylesheet" href="Styles/style.css">
</head>

<body>

<header>

    <img src="assets/images/hub1.png" class="top-logo" alt="Island Wellness Hub Logo">

    <h1>Island Wellness Hub</h1>
    <p class="tagline">Create an Account</p>

</header>

<main>

<section>

<h2>Register</h2>

<form onsubmit="registerUser(event)">
    <label>First Name</label>
    <input type="text" id="firstName" required>
    
    <label>Last Name</label>
    <input type="text" id="lastName" required>
    
    <label>Date of Birth</label>
    <input type="date" id="dob" required>
    
    <label>Gender</label>
    <select id="gender" required>
    <option value="">Select</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
    </select>
    
    <label>Phone</label>
    <input type="text" id="phone" required>
    
    <label>Email</label>
    <input type="email" id="email" required>
    
    <label>TRN (000-000-000)</label>
    <input type="text" id="trn" required>
    
    <label>Password</label>
    <input type="password" id="password" required>
    
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" required>

<br><br>

<button type="submit">Register</button>
<button type="reset">Cancel</button>

</form>
<button onclick="history.back()">← Go Back</button>

</section>

</main>

<footer>

<img src="assets/images/logo.jpg" class="footer-logo" alt="Logo">

<p><strong>Contact Us</strong></p>
<p>Email: islandwellness234@gmail.com</p>
<p>Phone: 876-555-1234</p>
<p>Location: Kingston, Jamaica</p>

</footer>

<script src="script/script.js"></script>

</body>
</html>
