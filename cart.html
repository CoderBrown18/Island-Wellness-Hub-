<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Island Wellness Hub</title>

    <link rel="stylesheet" href="../Styles/style.css">
</head>

<body>

<!-- HEADER -->
<header>

    <img src="../assets/images/hub2.png" class="top-logo" alt="Island Wellness Hub Logo">

    <h1>Island Wellness Hub</h1>
    <p class="tagline">Your Shopping Cart</p>

</header>

<!-- NAV -->
<nav>

    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
    <a href="about.html">About</a>

</nav>

<!-- MAIN -->
<main>

    <section>

        <h2>Your Cart</h2>

        <!-- CART ITEMS -->
        <ul id="cartItems"></ul>

        <!-- TOTALS -->
        <div class="cart-summary">

            <p>Subtotal: $<span id="subtotal">0</span></p>
            <p>Tax (15%): $<span id="tax">0</span></p>
            <h3>Total: $<span id="total">0</span></h3>

        </div>

        <!-- BUTTONS -->
        <div class="cart-buttons">

            <button onclick="clearCart()">Clear Cart</button>

            <a href="checkout.html">
                <button>Proceed to Checkout</button>
            </a>

        </div>

    </section>

</main>

<!-- BACK BUTTON -->
<div style="text-align:center;">
    <button onclick="history.back()">← Go Back</button>
</div>

<!-- FOOTER -->
<footer>

    <img src="../assets/images/logo.jpg" class="footer-logo" alt="Company Logo">

    <p><strong>Contact Us</strong></p>
    <p>Email: islandwellness234@gmail.com</p>
    <p>Phone: 876-555-1234</p>
    <p>Location: Kingston, Jamaica</p>

</footer>

<!-- JS -->
<script src="../script/script.js"></script>

</body>
</html>
