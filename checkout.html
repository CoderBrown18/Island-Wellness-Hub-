<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Island Wellness Hub</title>

    <link rel="stylesheet" href="../Styles/style.css">
</head>

<body>

<!-- HEADER -->
<header>

    <img src="../assets/images/hub1.png" class="top-logo" alt="Island Wellness Hub Logo">

    <h1>Island Wellness Hub</h1>
    <p class="tagline">Checkout</p>

</header>

<!-- NAV -->
<nav>

    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="checkout.html">Checkout</a>

</nav>

<!-- MAIN -->
<main>

    <section>

        <h2>Customer Information</h2>

        <!-- FORM -->
        <form onsubmit="placeOrder(event)">

            <!-- NAME -->
            <label for="name">Full Name:</label>
            <input type="text" id="name" required>

            <!-- EMAIL -->
            <label for="email">Email:</label>
            <input type="email" id="email" required>

            <!-- ADDRESS -->
            <label for="address">Address:</label>
            <textarea id="address" required></textarea>

            <h3>Preferences</h3>

            <!-- FREQUENCY -->
            <label for="frequency">How often would you use our services?</label>
            <select id="frequency">
                <option>Daily</option>
                <option>Weekly</option>
                <option>Monthly</option>
            </select>

            <!-- TRAINER -->
            <label for="trainer">Would you prefer a personal trainer?</label>
            <select id="trainer">
                <option>Yes</option>
                <option>No</option>
            </select>

            <!-- ONLINE -->
            <label for="online">Interested in online exercise classes?</label>
            <select id="online">
                <option>Yes</option>
                <option>No</option>
            </select>

            <!-- AGE -->
            <label for="age">Age Range</label>
            <select id="age">
                <option>18-25</option>
                <option>26-35</option>
                <option>36-45</option>
                <option>46+</option>
            </select>

            <br><br>

            <!-- REQUIRED BUTTONS -->
            <button type="submit">Confirm Order</button>

            <button type="button" onclick="clearCart()">Clear All</button>

            <button type="button" onclick="history.back()">Cancel</button>

            <button type="button" onclick="window.close()">Close</button>

        </form>

    </section>

</main>

<!-- FOOTER -->
<footer>

    <img src="../assets/images/logo.jpg" class="footer-logo" alt="Company Logo">

    <p><strong>Contact Us</strong></p>
    <p>Email: islandwellness234@gmail.com</p>
    <p>Phone: 876-555-1234</p>
    <p>Location: Kingston, Jamaica</p>

</footer>

<!-- JS -->
<script src="../script/script.js"></script>

</body>
</html>
